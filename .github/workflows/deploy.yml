name: deploy

# Build the Vite site and publish it to GitHub Pages.
# Triggers:
#   - push to main that touches a path in the allowlist below
#   - manual run from the Actions tab
# Cron-rewritten data files (stats/events/schedule) are NOT in the allowlist
# — clients fetch them straight from raw.githubusercontent.com instead.
on:
  push:
    branches: [main]
    # Allowlist, not denylist: cron-rewritten files (stats/events/schedule)
    # are served from raw.githubusercontent.com so they don't need a Pages
    # rebuild. Anything we *do* want to redeploy on must be listed below —
    # this way a future high-frequency data file added under public/data/
    # doesn't silently start triggering 2-min Vite rebuilds.
    paths:
      - 'src/**'
      - 'public/assets/**'
      - 'public/favicon.svg'
      - 'public/manifest.webmanifest'
      - 'public/data/rosters.json'
      - 'public/data/jokes.json'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Don't deploy two builds at the same time; the latest queued one wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
