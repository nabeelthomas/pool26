name: deploy

# Build the Vite site and publish it to GitHub Pages.
# Triggers:
#   - any push to main (including the cron's stats commit → site auto-refresh)
#   - manual run from the Actions tab
on:
  push:
    branches: [main]
    paths-ignore:
      # Data files are served from raw.githubusercontent.com, not Pages.
      # Excluding them means cron commits (every 2 min) don't trigger a
      # full Vite rebuild — deploys only happen when source code changes.
      - 'public/data/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Don't deploy two builds at the same time; the latest queued one wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
