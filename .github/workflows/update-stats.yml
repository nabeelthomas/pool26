name: update-stats

# Triggering is handled externally by cron-job.org, which POSTs to this
# workflow's dispatch endpoint every 2 minutes during NHL hours
# (19:00–06:45 UTC). We moved off GitHub's built-in `schedule:` because it's
# best-effort and routinely skips runs under platform load — unacceptable for
# a live leaderboard during a playoff game.
#
# 2-min cadence is fine cost-wise: each run is ~15s of Actions time and the
# script no-ops the stats.json write when nothing changed (see shallowEqualPlayers
# in scripts/update-stats.mjs). schedule.json/events.json always re-write since
# their generatedAt timestamps move every tick.
#
# If the external trigger ever breaks (cron-job.org paused, PAT expired, etc.),
# runs can still be kicked off manually from the Actions tab via `workflow_dispatch`.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest playoff stats
        run: node scripts/update-stats.mjs

      - name: Commit updated data files
        run: |
          git config user.name "pool26-bot"
          git config user.email "pool26-bot@users.noreply.github.com"
          git add public/data/stats.json public/data/events.json public/data/schedule.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(stats): refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
