name: update-stats

# Schedule (Eastern Daylight Time, which covers all of the playoffs):
#   09:00 ET                       (one daily morning catch-up)
#   every 15 minutes 15:00–03:00 ET  (active hockey window)
#
# Translated to UTC (EDT = UTC-4):
#   13:00 UTC                      → 09:00 ET
#   19:00–23:45 UTC every 15 min   → 15:00–19:45 ET
#   00:00–06:45 UTC every 15 min   → 20:00–02:45 ET
#   07:00 UTC                      → 03:00 ET (final tick)
#
# GitHub Actions cron is best-effort — runs may be delayed by a few minutes
# during high load on their side. That's fine for a leaderboard refresh.
# Public repos get unlimited Actions minutes, so the volume is free.
on:
  schedule:
    - cron: '0 13 * * *'           # 09:00 ET — morning catch-up
    - cron: '*/15 19-23 * * *'     # 15:00–19:45 ET (every 15 min)
    - cron: '*/15 0-6 * * *'       # 20:00–02:45 ET (every 15 min)
    - cron: '0 7 * * *'            # 03:00 ET — final tick
  workflow_dispatch: {}            # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest playoff stats
        run: node scripts/update-stats.mjs

      - name: Commit updated data files
        run: |
          git config user.name "pool26-bot"
          git config user.email "pool26-bot@users.noreply.github.com"
          git add public/data/stats.json public/data/events.json public/data/schedule.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(stats): refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
